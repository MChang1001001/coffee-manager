services:
  mysql:
    image: mysql:8.4
    container_name: coffee-manager-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: coffee_manager
      MYSQL_USER: coffee
      MYSQL_PASSWORD: coffee123
      TZ: Asia/Hong_Kong
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
